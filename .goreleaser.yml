builds:
  - env:
      - CGO_ENABLED=0
    binary: awdoc
    goos:
      - linux
      - windows
    goarch:
      - amd64
    ldflags:
      - -X main.version={{.Version}}
archives:
  - format: binary
release:
  mode: append
  name_template: 'awdoc' 
checksum:
  name_template: 'checksums.txt' # Контрольные суммы для проверки целостности